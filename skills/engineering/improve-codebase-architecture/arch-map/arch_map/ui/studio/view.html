<!DOCTYPE html>
<html lang="en" data-theme="light" data-dir="a">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>arch-map · view</title>
<!-- reuse the studio's design tokens (fonts, oklch palette, light/dark + directions) -->
<link rel="stylesheet" href="/assets/shared/ui.css">
<style>
  /* on-brand ad-hoc view — built entirely from the studio's design tokens */
  body { padding: 16px 20px; background: var(--bg); }
  .vhead { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
  .vhead h1 { font-size: 15px; font-weight: 600; margin: 0; letter-spacing: -0.01em; color: var(--text); }
  .vhead .count { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }
  .vhead .repo { font-family: var(--font-mono); font-size: 11px; color: var(--accent-text); margin-left: auto; }

  /* table */
  table.vt { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  table.vt th { text-align: left; font-weight: 500; color: var(--text-faint); font-size: 10px;
    text-transform: uppercase; letter-spacing: .06em; padding: 0 10px 7px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  table.vt td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  table.vt tbody tr:hover td { background: var(--panel-2); }
  .vt .id { font-family: var(--font-mono); font-weight: 600; color: var(--text); }
  .vt .dom { display: inline-block; font-size: 10.5px; font-family: var(--font-mono); color: var(--text-dim);
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 999px; padding: 1px 8px; }
  .vt .metric { display: flex; align-items: center; gap: 8px; min-width: 120px; }
  .vt .metric .bar { flex: 1; height: 6px; border-radius: 3px; background: var(--cov-track); overflow: hidden; }
  .vt .metric .bar i { display: block; height: 100%; background: var(--cov); }
  .vt .metric.depth .bar { background: var(--panel-2); }
  .vt .metric.depth .bar i { background: var(--accent); }
  .vt .metric .n { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); width: 36px; text-align: right; }
  .vt .tag { font-size: 10.5px; font-weight: 600; padding: 1px 8px; border-radius: 999px; white-space: nowrap; }
  .vt .tag.strong { background: var(--accent-weak); color: var(--strong); }
  .vt .tag.worth { background: var(--panel-2); color: var(--worth); }
  .vt .tag.speculative { background: var(--panel-2); color: var(--text-dim); }
  .vt .muted { color: var(--text-faint); }

  /* horizontal bars */
  .bars { display: flex; flex-direction: column; gap: 9px; max-width: 720px; }
  .barrow { display: grid; grid-template-columns: 168px 1fr 52px; align-items: center; gap: 12px; }
  .barrow .lbl { font-family: var(--font-mono); font-size: 11.5px; color: var(--text-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .barrow .track { height: 18px; border-radius: var(--radius-sm); background: var(--panel-2); border: 1px solid var(--border); overflow: hidden; }
  .barrow .track i { display: block; height: 100%; background: var(--accent); }
  .barrow.cov .track i { background: var(--cov); }
  .barrow .val { font-family: var(--font-mono); font-size: 11.5px; color: var(--text); text-align: right; }

  .empty { color: var(--text-faint); font-size: 13px; padding: 22px 2px; }
</style>
</head>
<body>
  <div class="vhead">
    <h1 id="vTitle">…</h1>
    <span class="count" id="vCount"></span>
    <span class="repo" id="vRepo"></span>
  </div>
  <div id="vBody"></div>

<script>
(function () {
  "use strict";
  const HOST = !!window.__ARCH_APP__;
  const $ = (id) => document.getElementById(id);
  const esc = (s) => (s == null ? "" : String(s)).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

  function draw(p) {
    if (!p || !p.kind) { $("vBody").innerHTML = '<div class="empty">No view data.</div>'; return; }
    $("vTitle").textContent = p.title || "View";
    $("vRepo").textContent = p.repo || "";
    $("vCount").textContent = p.count != null ? p.count + " " + (p.count === 1 ? "module" : "modules") : "";
    (p.kind === "bar" ? drawBars : drawTable)(p);
  }

  function cell(c, r) {
    const v = r[c];
    if (c === "id" || c === "label") return `<span class="id">${esc(v)}</span>`;
    if (c === "domain") return `<span class="dom">${esc(v)}</span>`;
    if (c === "depth" || c === "coverage") {
      const n = Math.round(v || 0), k = c === "depth" ? "depth" : "cov";
      return `<span class="metric ${k}"><span class="bar"><i style="width:${n}%"></i></span><span class="n">${n}%</span></span>`;
    }
    if (c === "suggestion") return v ? `<span class="tag ${esc(v.strength)}">${esc(v.label || v.strength)}</span>` : '<span class="muted">—</span>';
    return (v === "" || v == null) ? '<span class="muted">—</span>' : esc(v);
  }
  function drawTable(p) {
    const cols = p.columns || [];
    if (!p.rows || !p.rows.length) { $("vBody").innerHTML = '<div class="empty">Nothing matches.</div>'; return; }
    const head = cols.map((c) => `<th>${esc(c)}</th>`).join("");
    const body = p.rows.map((r) => "<tr>" + cols.map((c) => "<td>" + cell(c, r) + "</td>").join("") + "</tr>").join("");
    $("vBody").innerHTML = `<table class="vt"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
  }
  function drawBars(p) {
    if (!p.bars || !p.bars.length) { $("vBody").innerHTML = '<div class="empty">Nothing matches.</div>'; return; }
    const cls = p.metric === "coverage" ? "cov" : "";
    $("vBody").innerHTML = '<div class="bars">' + p.bars.map((b) =>
      `<div class="barrow ${cls}"><span class="lbl" title="${esc(b.label)}">${esc(b.label)}</span><span class="track"><i style="width:${Math.round(b.pct || 0)}%"></i></span><span class="val">${esc(b.value)}</span></div>`
    ).join("") + "</div>";
  }

  // ---- transports: HTTP (browser /view) vs MCP-App host -------------------
  async function httpInit() {
    try {
      const r = await fetch("/api/view" + location.search, { headers: { accept: "application/json" } });
      if (!r.ok) { $("vBody").innerHTML = '<div class="empty">Could not load view (' + r.status + ').</div>'; return; }
      draw(await r.json());
    } catch (e) { $("vBody").innerHTML = '<div class="empty">Could not reach the server.</div>'; }
  }
  function resultPayload(r) {
    let m = r && r.structuredContent;
    if (!m && r && Array.isArray(r.content)) { const t = r.content.find((c) => c && c.type === "text"); if (t && t.text) { try { m = JSON.parse(t.text); } catch (e) {} } }
    return m || null;
  }
  async function hostInit() {
    $("vBody").innerHTML = '<div class="empty">Waiting for the host…</div>';
    try {
      const { App } = await import("https://cdn.jsdelivr.net/npm/@modelcontextprotocol/ext-apps@1.7.2/+esm");
      const app = new App({ name: "arch-map-view", version: "1.0.0" });
      app.ontoolresult = (r) => { const p = resultPayload(r); if (p) draw(p); };  // render_view pushes the prepared view
      await Promise.race([app.connect(), new Promise((res) => setTimeout(res, 2500))]);
    } catch (e) { $("vBody").innerHTML = '<div class="empty">MCP-App connect failed.</div>'; }
  }

  // theme + aesthetic direction shared with the studio
  try {
    const pr = JSON.parse(localStorage.getItem("archmap.prefs.v1") || "{}");
    document.documentElement.setAttribute("data-theme", pr.theme || "light");
    document.documentElement.setAttribute("data-dir", pr.dir || "a");
  } catch (e) {}

  if (HOST) hostInit(); else httpInit();
})();
</script>
</body>
</html>
