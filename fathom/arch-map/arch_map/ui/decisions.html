<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>arch-map · decisions</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; background: #fafaf9; color: #0f172a;
        font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
      .wrap { max-width: 920px; margin: 0 auto; padding: 22px 22px 60px; }
      header { display: flex; align-items: baseline; justify-content: space-between;
        border-bottom: 1px solid #e2e8f0; padding-bottom: 12px; }
      h1 { font: 600 22px/1 ui-serif, Georgia, serif; margin: 0; }
      h1 .muted { color: #94a3b8; font-weight: 400; }
      .sub { color: #64748b; font-size: 12px; margin-top: 4px; }
      .counts { font-size: 12px; color: #64748b; text-align: right; }
      .counts b { color: #0f172a; font-size: 16px; }
      h2 { font: 600 13px/1 ui-sans-serif; text-transform: uppercase; letter-spacing: .08em;
        color: #94a3b8; margin: 30px 0 12px; }

      .card { border: 1px solid #e2e8f0; border-radius: 12px; background: #fff; padding: 16px; margin: 12px 0; }
      .card.decided { border-color: #cbd5e1; background: #fcfcfb; }
      .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
      .tag { font-size: 11px; padding: 2px 9px; border-radius: 999px; }
      .Strong { background: #d1fae5; color: #065f46; }
      .Worth.exploring, .Worth { background: #fef3c7; color: #92400e; }
      .Speculative { background: #e2e8f0; color: #475569; }
      .mod { font: 600 12px ui-monospace, Menlo, monospace; color: #475569; }
      .card h3 { font: 600 17px/1.2 ui-serif, Georgia, serif; margin: 10px 0 6px; }
      .card p { font-size: 13px; color: #475569; margin: 4px 0; }
      .wins { margin: 10px 0 0; padding-left: 18px; }
      .wins li { font-size: 13px; color: #334155; }

      .controls { margin-top: 14px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      button { font-size: 13px; padding: 7px 13px; border-radius: 8px; border: 1px solid #cbd5e1;
        background: #fff; cursor: pointer; color: #334155; }
      button:hover { border-color: #94a3b8; }
      button.accept { background: #059669; border-color: #059669; color: #fff; }
      button.defer  { background: #f59e0b; border-color: #f59e0b; color: #fff; }
      button.reject { background: #fff; border-color: #fca5a5; color: #b91c1c; }
      button.dismiss{ color: #94a3b8; border-color: #e2e8f0; }
      .note { flex: 1; min-width: 200px; font-size: 13px; padding: 7px 10px;
        border: 1px solid #cbd5e1; border-radius: 8px; }
      .verdict { font-size: 12px; font-weight: 600; padding: 2px 10px; border-radius: 999px; }
      .v-accepted { background: #d1fae5; color: #065f46; }
      .v-deferred { background: #fef3c7; color: #92400e; }
      .v-rejected { background: #fee2e2; color: #991b1b; }

      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
        color: #94a3b8; padding: 6px 8px; border-bottom: 1px solid #e2e8f0; }
      td { padding: 7px 8px; border-bottom: 1px solid #f1f5f9; }
      td .mod { font-size: 12px; }
      .step { display: inline-block; width: 20px; height: 20px; line-height: 18px; text-align: center;
        border: 1px solid #cbd5e1; border-radius: 5px; cursor: pointer; margin: 0 1px; }
      .step:hover { background: #f8fafc; }
      .del { color: #b91c1c; border-color: #fecaca; padding: 4px 9px; }
      .addform { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
      .addform input { font-size: 13px; padding: 7px 10px; border: 1px solid #cbd5e1; border-radius: 8px; }
      .addform button { background: #0f172a; color: #fff; border-color: #0f172a; }
      .empty { color: #94a3b8; font-style: italic; }
      #toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
        background: #0f172a; color: #fff; font-size: 13px; padding: 9px 16px; border-radius: 9px;
        opacity: 0; transition: opacity .2s; pointer-events: none; }
      #toast.show { opacity: 1; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div>
          <h1><span class="muted">arch-map ·</span> decisions · <span id="repo">…</span></h1>
          <div class="sub">decide on each deepening candidate — saved back to the server · <a href="/map" style="color:#4f46e5;text-decoration:none">open the graph ↗</a></div>
        </div>
        <div class="counts"><b id="openN">0</b> open · <span id="decidedN">0</span> decided</div>
      </header>

      <h2>Deepening candidates</h2>
      <div id="cards"></div>

      <h2>Modules</h2>
      <table>
        <thead><tr><th>module</th><th>domain</th><th>depth</th><th>coverage</th><th></th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
      <div class="addform">
        <input id="nmId" placeholder="id (e.g. order-cache)" />
        <input id="nmLabel" placeholder="label" />
        <input id="nmDomain" placeholder="domain" />
        <button onclick="addModule()">+ Add module</button>
      </div>
    </div>
    <div id="toast"></div>

    <script>
      let MODEL = null;

      async function api(path, body) {
        const opt = body
          ? { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body) }
          : {};
        const r = await fetch(path, opt);
        const d = await r.json();
        if (!r.ok || d.error) { toast(d.error || ("error " + r.status)); throw new Error(d.error); }
        return d;
      }
      async function load() { MODEL = await api("/api/model"); render(); }
      async function act(body, msg) { MODEL = await api("/api/act", body); render(); if (msg) toast(msg); }

      function esc(s) { return (s == null ? "" : String(s)).replace(/[&<>"]/g, c =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }
      function toast(m) { const t = document.getElementById("toast"); t.textContent = m;
        t.classList.add("show"); clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove("show"), 1800); }

      function render() {
        document.getElementById("repo").textContent = MODEL.repo;
        const withSugg = MODEL.modules.filter(m => m.suggestion);
        const open = withSugg.filter(m => !m.suggestion.decision);
        document.getElementById("openN").textContent = open.length;
        document.getElementById("decidedN").textContent = withSugg.length - open.length;

        // ---- decision cards ----
        const cards = document.getElementById("cards");
        if (!withSugg.length) { cards.innerHTML = '<p class="empty">No open candidates.</p>'; }
        else cards.innerHTML = withSugg.map(m => {
          const s = m.suggestion, sid = s.id, dec = s.decision;
          const verdict = dec
            ? `<span class="verdict v-${dec}">${dec}${s.note ? " — " + esc(s.note) : ""}</span>` : "";
          return `
          <div class="card ${dec ? "decided" : ""}">
            <div class="row">
              <span class="tag ${s.strength.replace(" ", ".")}">${esc(s.strength)}</span>
              <span class="mod">${esc(m.id)}</span> ${verdict}
            </div>
            <h3>${esc(s.title)}</h3>
            <p><b>Problem.</b> ${esc(s.problem)}</p>
            <p><b>Solution.</b> ${esc(s.solution)}</p>
            <ul class="wins">${(s.wins || []).map(w => `<li>${esc(w)}</li>`).join("")}</ul>
            <div class="controls">
              <input class="note" id="note-${sid}" placeholder="reason (saved with the decision)" value="${esc(s.note)}" />
              <button class="accept" onclick="decide('${sid}','accepted')">Accept</button>
              <button class="defer"  onclick="decide('${sid}','deferred')">Defer</button>
              <button class="reject" onclick="decide('${sid}','rejected')">Reject</button>
              <button class="dismiss" onclick="dismiss('${sid}')">Dismiss</button>
            </div>
          </div>`;
        }).join("");

        // ---- module table ----
        document.getElementById("rows").innerHTML = MODEL.modules.map(m => `
          <tr>
            <td><span class="mod">${esc(m.id)}</span><br><span style="color:#64748b">${esc(m.label)}</span></td>
            <td>${esc(m.domain)}</td>
            <td><span class="step" onclick="step('${m.id}','depth',-0.1)">−</span>${m.depth.toFixed(2)}<span class="step" onclick="step('${m.id}','depth',0.1)">+</span></td>
            <td><span class="step" onclick="step('${m.id}','coverage',-0.1)">−</span>${m.coverage.toFixed(2)}<span class="step" onclick="step('${m.id}','coverage',0.1)">+</span></td>
            <td><button class="del" onclick="delModule('${m.id}','${esc(m.label)}')">delete</button></td>
          </tr>`).join("");
      }

      function decide(sid, decision) {
        const note = (document.getElementById("note-" + sid).value || "").trim();
        act({ action: "decide", suggestion_id: sid, decision, note }, "Saved: " + decision);
      }
      function dismiss(sid) { act({ action: "resolve", suggestion_id: sid }, "Dismissed"); }
      function step(id, field, delta) {
        const m = MODEL.modules.find(x => x.id === id); if (!m) return;
        const v = Math.max(0, Math.min(1, +(m[field] + delta).toFixed(2)));
        act({ action: field === "depth" ? "set_depth" : "set_coverage", module: id,
              [field === "depth" ? "score" : "fraction"]: v });
      }
      function delModule(id, label) {
        if (!confirm("Delete " + label + "? Edges pointing at it are pruned.")) return;
        act({ action: "delete", module: id }, "Deleted " + id);
      }
      function addModule() {
        const v = i => (document.getElementById(i).value || "").trim();
        const id = v("nmId"); if (!id) { toast("id required"); return; }
        act({ action: "add", module: { id, label: v("nmLabel") || id, domain: v("nmDomain") || "general" } }, "Added " + id);
        ["nmId", "nmLabel", "nmDomain"].forEach(i => (document.getElementById(i).value = ""));
      }

      load();
    </script>
  </body>
</html>
